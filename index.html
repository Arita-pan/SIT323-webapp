<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud-Native Web App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 0.5rem; }
    p { color: #94a3b8; margin-bottom: 2rem; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #0ea5e9;
      color: #fff;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      margin: 0.25rem;
    }
    .status { margin-top: 1.5rem; font-size: 0.85rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>☁️ Cloud-Native App</h1>
    <p>Deployed on GKE · SIT323/SIT737 Stage 1</p>
    <span class="badge">Docker</span>
    <span class="badge">GKE</span>
    <span class="badge">Cloud Build</span>
    <span class="badge">Artifact Registry</span>
    <p class="status">Running successfully in Kubernetes pod</p>
  </div>
</body>
</html>
