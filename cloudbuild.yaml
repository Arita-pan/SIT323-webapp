steps:
  # Step 1: Login to Docker Hub
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "$$DOCKERHUB_PASSWORD" | docker login \
          -u "$$DOCKERHUB_USERNAME" --password-stdin
    secretEnv: ['DOCKERHUB_USERNAME', 'DOCKERHUB_PASSWORD']

  # Step 2: Build image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'aritapan/sit323-webapp:latest'
      - '-t'
      - 'aritapan/sit323-webapp:$SHORT_SHA'
      - '.'

  # Step 3: Push to Docker Hub
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'aritapan/sit323-webapp']

  # Step 4: Also push to Artifact Registry (for evidence only)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'tag'
      - 'aritapan/sit323-webapp:latest'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/sit323-webapp/webapp:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/sit323-webapp/webapp:latest'

  # Step 5: Deploy to GKE (pulls from Docker Hub)
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/webapp-deployment'
      - 'webapp=aritapan/sit323-webapp:latest'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=australia-southeast1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=sit323-webapp'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/dockerhub-username/versions/latest
      env: 'DOCKERHUB_USERNAME'
    - versionName: projects/$PROJECT_ID/secrets/dockerhub-password/versions/latest
      env: 'DOCKERHUB_PASSWORD'

options:
  logging: CLOUD_LOGGING_ONLY
